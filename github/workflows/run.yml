name: Rodar Robo de Escanteios

on:
  schedule:
    - cron: '*/10 * * * *' # Roda automaticamente a cada 10 minutos
  workflow_dispatch: # Permite que você clique no botão e rode manualmente quando quiser

jobs:
  rodar-script:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do Github
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar as bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar o Robo
        run: python Main.py
